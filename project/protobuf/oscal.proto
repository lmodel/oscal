 {
  uUIDType uuid = 0
  uUIDType provided-uuid = 0
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  sspByComponentResponsibleRole responsible-roles = 0
  markupMultilineType remarks = 0
 }
