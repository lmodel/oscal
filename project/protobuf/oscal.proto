 {
  uUIDType uuid = 0
  markupMultilineType description = 0
 repeated  implementedComponent implemented-components = 0
 repeated  implementationCommonProperty props = 0
 repeated  implementationCommonLink links = 0
 repeated  implementationResponsibleParty responsible-parties = 0
  markupMultilineType remarks = 0
 }
// A description of another authorized system from which this system inherits capabilities that satisfy security requirements. Another term for this concept is a common control provider.
