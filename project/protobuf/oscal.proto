 syntax="proto3";
 package
// metamodel_version: 1.7.0
// version: 1.2.1
// An action applied by a role within a given party to the content.
message Action
 {
  uUIDType uuid = 0
  actionTypeEnum type = 0
  dateTimeWithTimezoneType date = 0
  uRIType system = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleParty responsible-parties = 0
 }
// Identifies an assessment or related process that can be performed. In the assessment plan, this is an intended activity.
message Activity
 {
  uUIDType uuid = 0
  markupLineType title = 0
  markupMultilineType description = 0
 repeated  step steps = 0
  reviewedControls related-controls = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleRole responsible-roles = 0
 }
// Specifies content to be added into controls in resolution.
message Addition
 {
  additionPositionEnum position = 0
  tokenType by-id = 0
  markupLineType title = 0
 repeated  parameter params = 0
 repeated  profileAlterationProperty props = 0
 repeated  link links = 0
 repeated  part parts = 0
 }
// A postal address for the location.
message Address
 {
  string type = 0
 repeated  string addr-lines = 0
  string city = 0
  string state = 0
  string postal-code = 0
  string country = 0
 }
// Specifies changes to be made to an included control when a profile is resolved.
message Alteration
 {
  tokenType control-id = 0
 repeated  removal removes = 0
 repeated  addition adds = 0
 }
// Identifies the assets used to perform this assessment.
message AssessmentAssets
 {
 repeated  systemComponent components = 0
 repeated  assessmentPlatform assessment-platforms = 0
 }
// A log of all assessment-related actions taken.
message AssessmentLog
 {
 repeated  assessmentLogEntry entries = 0
 }
// Identifies the result of an action and/or task that occurred as part of executing an assessment plan or assessment event.
message AssessmentLogEntry
 {
  uUIDType uuid = 0
  markupLineType title = 0
  markupMultilineType description = 0
  dateTimeWithTimezoneType start = 0
  dateTimeWithTimezoneType end = 0
 repeated  loggedBy logged-by = 0
 repeated  relatedTask related-tasks = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A local definition of a control objective.
message AssessmentMethod
 {
  uUIDType uuid = 0
  markupMultilineType description = 0
  assessmentPart part = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A partition of an assessment plan or results or a child of another part.
message AssessmentPart
 {
  uUIDType uuid = 0
  tokenType name = 0
  uRIType ns = 0
  tokenType class = 0
  markupLineType title = 0
  markupMultilineType prose = 0
 repeated  assessmentPart parts = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// An assessment plan, such as those provided by a FedRAMP assessor.
message AssessmentPlan
 {
  uUIDType uuid = 0
  metadata metadata = 0
  importSSP import-ssp = 0
  localDefinitions local-definitions = 0
  termsAndConditions terms-and-conditions = 0
 repeated  assessmentSubject assessment-subjects = 0
  assessmentAssets assessment-assets = 0
  reviewedControls reviewed-controls = 0
 repeated  task tasks = 0
  backMatter back-matter = 0
 }
// Root wrapper for an OSCAL Assessment Plan document.
message AssessmentPlanDocument
 {
  assessmentPlan assessment-plan = 0
 }
// Used to represent the toolset used to perform aspects of the assessment.
message AssessmentPlatform
 {
  uUIDType uuid = 0
  markupLineType title = 0
 repeated  usesComponent uses-components = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Security assessment results, such as those provided by a FedRAMP assessor in a security assessment report.
message AssessmentResults
 {
  uUIDType uuid = 0
  metadata metadata = 0
  importAssessmentPlan import-ap = 0
  assessmentResultsLocalDefinitions local-definitions = 0
 repeated  result results = 0
  backMatter back-matter = 0
 }
// Root wrapper for an OSCAL Assessment Results document.
message AssessmentResultsDocument
 {
  assessmentResults assessment-results = 0
 }
// Used to define data objects that are referenced by the assessment results but do not appear in the imported assessment plan.
message AssessmentResultsLocalDefinitions
 {
 repeated  localObjective objectives-and-methods = 0
 repeated  activity activities = 0
  markupMultilineType remarks = 0
 }
// Select a specific control for inclusion/exclusion in the assessment by literal control ID and optional statement IDs.
message AssessmentSelectControlById
 {
  tokenType control-id = 0
 repeated  tokenType statement-ids = 0
 }
// Identifies system elements being assessed, such as components, inventory items, and locations.
message AssessmentSubject
 {
  string type = 0
  markupMultilineType description = 0
  includeAll include-all = 0
 repeated  selectSubjectById include-subjects = 0
 repeated  selectSubjectById exclude-subjects = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Used when the assessment subjects will be determined as part of one or more other assessment activities.
message AssessmentSubjectPlaceholder
 {
  uUIDType uuid = 0
  markupMultilineType description = 0
 repeated  assessmentSubjectSource sources = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Assessment subjects will be identified while conducting the referenced activity.
message AssessmentSubjectSource
 {
  uUIDType task-uuid = 0
  markupMultilineType remarks = 0
 }
// Identifies an individual activity to be performed as part of a task.
message AssociatedActivity
 {
  uUIDType activity-uuid = 0
 repeated  assessmentSubject subjects = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleRole responsible-roles = 0
 }
// Relates the finding to a set of referenced risks.
message AssociatedRisk
 {
  uUIDType risk-uuid = 0
  markupMultilineType remarks = 0
 }
// The task is intended to occur at the specified frequency.
message AtFrequency
 {
  positiveIntegerType period = 0
  timingUnitEnum unit = 0
  markupMultilineType remarks = 0
 }
// A set of textual attestation statements, typically written by the assessor.
message Attestation
 {
 repeated  assessmentPart parts = 0
 repeated  responsibleParty responsible-parties = 0
 }
// A description of this system's authorization boundary, optionally supplemented with diagrams that illustrate the authorization boundary.
message AuthorizationBoundary
 {
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  diagram diagrams = 0
  markupMultilineType remarks = 0
 }
// Identifies a specific system privilege held by the user, along with an associated description and/or rationale for the privilege.
message AuthorizedPrivilege
 {
  markupLineType title = 0
  markupMultilineType description = 0
 repeated  string functions-performed = 0
 }
// A collection of resources that may be referenced from within the OSCAL document instance.
message BackMatter
 {
 repeated  resource resources = 0
 }
// A resource encoded using the Base64 alphabet defined by RFC 2045.
message Base64Resource
 {
  string media-type = 0
  base64Type value = 0
  tokenType filename = 0
 }
// Defines how the referenced component implements a set of controls.
message ByComponent
 {
  uUIDType component-uuid = 0
  uUIDType uuid = 0
  markupMultilineType description = 0
 repeated  sspControlOriginationProp props = 0
 repeated  sspByComponentLink links = 0
 repeated  setParameter set-parameters = 0
  implementationStatus implementation-status = 0
  export export = 0
 repeated  inheritedControlImplementation inherited = 0
 repeated  satisfiedControlImplementation satisfied = 0
 repeated  sspByComponentResponsibleRole responsible-roles = 0
  markupMultilineType remarks = 0
 }
// A grouping of other components and/or capabilities.
message Capability
 {
  uUIDType uuid = 0
  string name = 0
  markupMultilineType description = 0
 repeated  incorporatesComponent incorporates-components = 0
 repeated  controlImplementationSet control-implementations = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A structured, organized collection of control information.
message Catalog
 {
  uUIDType uuid = 0
  metadata metadata = 0
  backMatter back-matter = 0
 repeated  parameter params = 0
 repeated  control controls = 0
 repeated  group groups = 0
 }
// Root wrapper for an OSCAL Catalog document.
message CatalogDocument
 {
  catalog catalog = 0
 }
// A collection of descriptive data about the containing object from a specific origin.
message Characterization
 {
  origin origin = 0
 repeated  facet facets = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// An optional citation consisting of end note text using structured markup.
message Citation
 {
  markupLineType text = 0
 repeated  link links = 0
 repeated  property props = 0
 }
// Defines how to resolve duplicate instances of the same control (e.g., controls with the same ID) encountered in a profile merge.
message CombinationRule
 {
  combinationMethodEnum method = 0
 }
// A collection of component descriptions, which may optionally be grouped by capability.
message ComponentDefinition
 {
  uUIDType uuid = 0
  metadata metadata = 0
 repeated  importComponentDefinition import-component-definitions = 0
 repeated  definedComponent components = 0
 repeated  capability capabilities = 0
  backMatter back-matter = 0
 }
// Root wrapper for an OSCAL Component Definition document.
message ComponentDefinitionDocument
 {
  componentDefinition component-definition = 0
 }
// Describes the operational status of the system component.
message ComponentStatus
 {
  componentStateEnum state = 0
  markupMultilineType remarks = 0
 }
// Confidence represented as a category and/or percentage value.
message ConfidenceScore
 {
  string category = 0
  float percentage = 0
 }
// A test expression which is expected to be evaluated by a tool.
message ConstraintTest
 {
  markupMultilineType remarks = 0
  string expression = 0
 }
// A structured object representing a requirement or guideline, which when implemented will reduce an aspect of risk related to an information system and its information.
message Control
 {
  tokenType id = 0
  tokenType class = 0
  markupLineType title = 0
 repeated  parameter params = 0
 repeated  part parts = 0
 repeated  control controls = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Defines how the component or capability supports a set of controls.
message ControlImplementationSet
 {
  uUIDType uuid = 0
  uRIReferenceType source = 0
  markupMultilineType description = 0
 repeated  setParameter set-parameters = 0
 repeated  implementedRequirement implemented-requirements = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Selecting a set of controls by matching their IDs with a wildcard pattern.
message ControlMatching
 {
  markupMultilineType remarks = 0
  string pattern = 0
 }
// Identifies the control objectives of the assessment.
message ControlObjectiveSelection
 {
  markupMultilineType description = 0
  includeAll include-all = 0
 repeated  selectObjectiveById include-objectives = 0
 repeated  selectObjectiveById exclude-objectives = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// An annotated, markup-based textual element of a control's or catalog group's definition, or a child of another part.
message ControlPart
 {
  tokenType id = 0
  tokenType name = 0
  uRIType ns = 0
  tokenType class = 0
  markupLineType title = 0
  markupMultilineType prose = 0
 repeated  controlPart parts = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Describes a control implementation responsibility imposed on a leveraging system.
message ControlResponsibility
 {
  uUIDType uuid = 0
  uUIDType provided-uuid = 0
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  sspByComponentResponsibleRole responsible-roles = 0
  markupMultilineType remarks = 0
 }
// Identifies the controls being assessed.
message ControlSelection
 {
  markupMultilineType description = 0
  includeAll include-all = 0
 repeated  assessmentSelectControlById include-controls = 0
 repeated  assessmentSelectControlById exclude-controls = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A percentage representing target coverage by source mappings.
message Coverage
 {
  string generation-method = 0
  float target-coverage = 0
 }
// A description of the logical flow of information within the system and across its boundaries, optionally supplemented with diagrams.
message DataFlow
 {
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  diagram diagrams = 0
  markupMultilineType remarks = 0
 }
// A defined component that can be part of an implemented system.
message DefinedComponent
 {
  uUIDType uuid = 0
  string type = 0
  markupLineType title = 0
  markupMultilineType description = 0
  markupLineType purpose = 0
 repeated  protocol protocols = 0
 repeated  controlImplementationSet control-implementations = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleRole responsible-roles = 0
 }
// A graphic that provides a visual representation the system, or some aspect of it.
message Diagram
 {
  uUIDType uuid = 0
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  sspDiagramLink links = 0
  string caption = 0
  markupMultilineType remarks = 0
 }
// A document identifier qualified by an identifier scheme.
message DocumentId
 {
  uRIType scheme = 0
  string identifier = 0
 }
// The timing under which the task is intended to occur.
message EventTiming
 {
  onDateCondition on-date = 0
  withinDateRange within-date-range = 0
  atFrequency at-frequency = 0
 }
// Defines a set of control implementations that are provided as reference implementations for use by organizations implementing the leveraged system.
message Export
 {
  markupMultilineType description = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  providedControlImplementation provided = 0
 repeated  controlResponsibility responsibilities = 0
 }
// An individual characteristic that is part of a larger set produced by the same actor.
message Facet
 {
  tokenType name = 0
  string value = 0
  uRIType system = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Describes an individual finding.
message Finding
 {
  uUIDType uuid = 0
  markupLineType title = 0
  markupMultilineType description = 0
  findingTarget target = 0
  uUIDType implementation-statement-uuid = 0
 repeated  origin origins = 0
 repeated  relatedObservation related-observations = 0
 repeated  associatedRisk related-risks = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// Captures an assessor's conclusions regarding the degree to which an objective is satisfied.
message FindingTarget
 {
  findingTargetTypeEnum type = 0
  tokenType target-id = 0
  markupLineType title = 0
  markupMultilineType description = 0
  implementationStatus implementation-status = 0
  objectiveStatus status = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A summary of controls that were not mapped.
message GapSummary
 {
  uUIDType uuid = 0
 repeated  selectControlById unmapped-controls = 0
 }
// A group of controls, or of groups of controls.
message Group
 {
  tokenType id = 0
  tokenType class = 0
  markupLineType title = 0
 repeated  parameter params = 0
 repeated  part parts = 0
 repeated  group groups = 0
 repeated  control controls = 0
 repeated  property props = 0
 repeated  link links = 0
 }
// A representation of a cryptographic digest generated over a resource using a specified hash algorithm.
message Hash
 {
  string value = 0
  string algorithm = 0
 }
// Used to detail assessment subjects that were identified by this task.
message IdentifiedSubject
 {
  uUIDType subject-placeholder-uuid = 0
 repeated  assessmentSubject subjects = 0
 }
// The expected level of impact resulting from the described information's confidentiality, integrity, or availability affect.
message ImpactLevel
 {
 repeated  property props = 0
 repeated  link links = 0
  string base = 0
  string selected = 0
  string adjustment-justification = 0
 }
// Implementation-common scoped OSCAL link.
message ImplementationCommonLink
 {
  uRIReferenceType href = 0
  string resource-fragment = 0
  string media-type = 0
  markupLineType text = 0
  tokenType rel = 0
 }
// Implementation-common scoped OSCAL property.
message ImplementationCommonProperty
 {
  uUIDType uuid = 0
  uRIType ns = 0
  tokenType class = 0
  markupMultilineType remarks = 0
  tokenType group = 0
  implementationPropNameEnum name = 0
  string value = 0
 }
// Implementation-common scoped responsible party.
message ImplementationResponsibleParty
 {
 repeated  uUIDType party-uuids = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
  tokenType role-id = 0
 }
// Implementation-common scoped responsible role.
message ImplementationResponsibleRole
 {
 repeated  uUIDType party-uuids = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
  tokenType role-id = 0
 }
// Indicates the degree to which a given control is implemented.
message ImplementationStatus
 {
  string state = 0
  markupMultilineType remarks = 0
 }
// The set of components that are implemented in a given system inventory item.
message ImplementedComponent
 {
  uUIDType component-uuid = 0
 repeated  implementationCommonProperty props = 0
 repeated  implementationCommonLink links = 0
 repeated  implementationResponsibleParty responsible-parties = 0
  markupMultilineType remarks = 0
 }
// Identifies which statements within a control are addressed.
message ImplementedControlStatement
 {
  tokenType statement-id = 0
  uUIDType uuid = 0
  markupMultilineType description = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleRole responsible-roles = 0
 }
// Describes how the containing component or capability implements an individual control.
message ImplementedRequirement
 {
  uUIDType uuid = 0
  tokenType control-id = 0
  markupMultilineType description = 0
 repeated  setParameter set-parameters = 0
 repeated  implementedControlStatement statements = 0
  markupMultilineType remarks = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  responsibleRole responsible-roles = 0
 }
// Used by assessment-results to import information about the original plan for assessing the system.
message ImportAssessmentPlan
 {
  uRIReferenceType href = 0
  markupMultilineType remarks = 0
 }
// Loads a component definition from another resource.
message ImportComponentDefinition
 {
  uRIReferenceType href = 0
  markupMultilineType remarks = 0
 }
// Used to import the OSCAL profile representing the system's control baseline.
message ImportProfile
 {
  uRIReferenceType href = 0
  markupMultilineType remarks = 0
 }
// Used by the assessment plan and POA&M to import information about the system.
message ImportSSP
 {
  uRIReferenceType href = 0
  markupMultilineType remarks = 0
 }
// The collection of components comprising a capability.
message IncorporatesComponent
 {
  uUIDType component-uuid = 0
  markupMultilineType description = 0
 }
// Contains details about one information type that is stored, processed, or transmitted by the system, such as privacy information, and its impact level.
message InformationType
 {
  uUIDType uuid = 0
  markupLineType title = 0
  markupMultilineType description = 0
 repeated  informationTypeCategorization categorizations = 0
 repeated  property props = 0
 repeated  link links = 0
  impactLevel confidentiality-impact = 0
  impactLevel integrity-impact = 0
  impactLevel availability-impact = 0
 }
// A set of information type identifiers qualified by the given identification system used.
