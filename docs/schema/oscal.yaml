name: oscal
annotations:
  uuid:
    tag: uuid
    value: e0b9845b-6de4-4f52-a96c-56255f507520
  last-modified:
    tag: last-modified
    value: '2026-03-27T10:00:00Z'
description: 'OSCAL: Open Security Controls Assessment Language: LinkML Schema'
title: oscal
notes:
- '{''Every time the content of an OSCAL file changes, the following must also change'':
  None}'
- A new UUID value must be generated and assigned to the root element's uuid.
- The last-modified field in metadata must be assigned with the date and time at the
  moment the file is saved with the modified content.
- These are two mechanisms by which tools can quickly know if a file has changed since
  it was last encountered. This document level UUID is the only UUID in OSCAL associated
  with version control.
- When converting between formats, such as XML to JSON, these values should remain
  the same. This enables tools to know the content within the two formats is equivalent.
see_also:
- https://lmodel.github.io/oscal
