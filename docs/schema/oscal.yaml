    - remarks
    - links
    slot_usage:
      id:
        name: id
        description: A unique identifier for the parameter.
        required: true
      _class:
        name: _class
        description: A textual label that provides a characterization of the type,
          purpose, use or scope of the parameter.
      props:
        name: props
        range: ParameterProperty
    class_uri: oscal_catalog:Parameter
    rules:
    - preconditions:
        slot_conditions:
          values:
            name: values
            value_presence:
              text: PRESENT
      postconditions:
        slot_conditions:
          select:
            name: select
            value_presence:
              text: ABSENT
      description: A parameter may have prescribed values or a selection construct,
        but not both (metaschema <choice> constraint).
      title: values-xor-select
    - preconditions:
        slot_conditions:
          select:
            name: select
            value_presence:
              text: PRESENT
      postconditions:
        slot_conditions:
          values:
            name: values
            value_presence:
              text: ABSENT
      title: select-xor-values
