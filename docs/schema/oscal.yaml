    - Resource_document-ids
    - remarks
    - citation
    - rlinks
    - base64
    slot_usage:
      uuid:
        name: uuid
        description: A unique identifier for a resource.
        required: true
      title:
        name: title
        description: An optional name given to the resource, which may be used by
          a tool for display and navigation.
      description:
        name: description
        description: An optional short summary of the resource used to indicate the
          purpose of the resource.
      props:
        name: props
        range: ResourceProperty
      document-ids:
        name: document-ids
        range: DocumentId
    class_uri: oscal_catalog:Resource
