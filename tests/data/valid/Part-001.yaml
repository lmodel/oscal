---
# A Part with nested sub-parts
id: ac-1_smt
name: statement
title: AC-1 Statement
prose: >-
  The organization develops, documents, and disseminates an access control
  policy that addresses purpose, scope, roles, responsibilities, management
  commitment, coordination among organizational entities, and compliance.
parts:
  - id: ac-1_smt.a
    name: item
    prose: >-
      Develop and document an access control policy that covers purpose,
      scope, roles, and responsibilities.
  - id: ac-1_smt.b
    name: item
    prose: >-
      Designate an official to manage the development, documentation, and
      dissemination of the access control policy and procedures.
  - id: ac-1_smt.c
    name: item
    prose: >-
      Review and update the access control policy and procedures in accordance
      with organization-defined frequencies.
